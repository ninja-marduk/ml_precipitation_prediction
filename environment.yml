# ============================================================================
# Conda environment for ML Precipitation Prediction workflow
# Tested on: Windows 10 (local) and BSC MN5 (Linux)
#
# Create:
#   conda env create -f environment.yml
#   conda activate mlprecipitation
#
# Update existing:
#   conda env update -f environment.yml --prune
#
# Remove:
#   conda env remove -n mlprecipitation
# ============================================================================
name: precipitation_prediction

channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.12

  # Core scientific computing
  - numpy>=2.0
  - pandas>=2.0
  - scipy>=1.13

  # Data handling - both engines for cross-environment compatibility
  - xarray>=2024.0
  - netcdf4>=1.7
  - h5netcdf>=1.3
  - h5py>=3.10

  # Geospatial
  - rioxarray>=0.17
  - rasterio>=1.4
  - dask>=2024.0

  # Machine learning
  - scikit-learn>=1.5
  - statsmodels>=0.14

  # Visualization
  - matplotlib>=3.9
  - seaborn>=0.13

  # Utilities
  - pyyaml>=6.0
  - tqdm>=4.66
  - psutil>=6.0

  # Development
  - pip
  - jupyter
  - ipykernel

  # pip-only packages (deep learning frameworks)
  - pip:
      - tensorflow>=2.19
      - torch>=2.5
      # PyTorch Geometric (V4 GNN-TAT) - install separately if needed:
      #   pip install torch-geometric
